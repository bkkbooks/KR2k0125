body:
  text: 閩中海錯疏卷中明屠本畯撰鱗部下烏鰂柔魚墨斗猴染烏鰂一名墨魚大者名花枝形如鞋囊肉白皮斑無鱗八足前有二鬚極長集足在口緣喙在腹腹中血及膽正黑背上有骨潔白厚三四分形如布梭輕虛如通草可刻鏤以指剔之如粉名海鰾鮹醫家取以入藥古稱是海若白事小吏一名河伯從事按鰂遇風波即以二帶捉石浮身水上見人及大魚輒吐墨方數尺以混其身人反以是得之其墨能巳心痛小魚蝦過其前輒吐墨涎致之性嗜烏每暴水上烏見以為死便往啄之乃卷而食之月令九月寒烏入水化為烏鰂唐韻所載羅碩云此魚乃􅖂烏所化蓋水烏之似鶂者今其口足并目尚存形似且以背上之骨驗之晒乾者閩浙謂之明府柔似烏鰂而長色紫一名鎖管按柔有骨如三層紙厚白而差紉云無骨非也但鰂作腥柔不作腥而味佳墨斗似鎖管而小亦能吐墨補疏猴染比墨斗稍大比鎖管稍小補疏馬鮫嘉酥魚鰛馬鮫青斑色無鱗有齒又名章鮌連江志謂之章胡按閩志稱鯧魚肉理細嫩而甘馬鮫肉稍澀氣腥而不及鯧此説非也蓋鯧細口扁身而團無鱗無腸馬鮫鋭口圎身而長無鱗有腸嘉酥魚海中魚之極大者重千斤琉球人以其脊為酥販鬻閩中補疏鰛似馬鮫而小有鱗大者僅三四寸酬鯯黃雀青鮫酬鯯板身多鯁而肥美爾雅謂之當魬黃雀似鯯而小冬月最盛青鮫類黃雀而不甚大帶魚帶栁帶身薄而長其形如帶鋭口尖尾只一脊骨而無鯁無鱗入夜爛然有光大者長五六尺帶栁帶之小者也味差不及帶按帶冬月最盛一釣則羣帶銜尾而升故市者獨多或言帶無尾者非也蓋為羣帶相銜而尾脫也鱆魚石拒章舉塗婆鱆腹圎口在腹下多足足長環聚口傍紫色足上皆有圎文凸起腹內有黃褐色質如卵黃有黑如烏鰂墨有白粒如大麥味皆美明州謂之望潮按鱆有腹無頭而俗以腹為頭非也有名同而質異者廣南有蟹亦名望潮他日廣浙相傳慎勿以此物即彼物也石拒似鱆而極大居石穴中人或取之能以足粘石拒人章舉紅舉也似石拒而大塗婆章舉也似石拒而足短按明州所産章舉大有至五六斤者與鱆魚性俱寒不可多食能發宿疾䲅䲅鮭也一名胡夷一名鯸鮐一名河豚狀如科斗腹下白背上青有黃文眼能開閉頭無腮腹無膽觸物輒嗔腹張如鞫浮於水上味至美然有毒能殺人按䲅無腮無膽故肝最毒肝血及子入口爛舌入腹爛腸以其味美吳浙喜食之今烹者必覆蓋蒙密忌炱煤落其中雜以荻芽或橄欖煮之方可食豫在兩淮食河豚而𨽻卒取其子去製以市人皮肚潔白俗名西施乳水母水母一名鮀一名鮓海中浮漚所結也色正白濛濛如沫又如凝血縱廣數尺有知識無腹臟無頭目處所不知避人隨其東西以蝦為目無蝦則浮沉不常蝦憑之其泛水如飛蝦見人驚去鮀亦隨之而沒潮退蝦棄之於陸故為人所獲本草謂水母為樗蒲魚北户録謂水母為蚱一名石鏡南人治而食之性熱偏療河魚疾也補疏按物類相感志云水母大者如牀小者如斗明州謂之蝦鮓其紅者名海蜇其白者名白皮子皮切作縷名水母線嶺表異録云淡紫色大者如覆帽小者如碗腹下有物如懸絮魟魚魟斑車水蓋黃貂黑魟形如團扇口在腹下無鱗軟骨紫黑色尾長於身能螫人此魚頭圎秃如燕身圓褊如簸尾圎長如牛尾其尾極毒能螫人有中之者日夜號呼不止以其首似燕名燕魟魚以其尾似牛尾故又名牛尾魚其味美在肝俗呼鯕魚補疏魟背厚尾長有􆀋大者二三百斤水蓋背差薄於􅲭刳之多水斑車背上有斑肉粗而味腴大者三四百斤其腹中有肚味更佳黃貂似燕而嘴尖土人薧以為鮝偽作燕按魟其種不一而骨肉同諸魟以黃貂為第一彈塗白頰塗蝨彈塗大如拇指鬚鬛青斑色生泥穴中夜則駢首朝北一名跳魚海物異名記云登物捷若猴然故名泥猴白頰似跳魚而頰白塗蝨生於泥中如蝨故名一呼塗蝨有刺彈人一名彈瑟田塍潭底往往有之一名田瑟䱠魚白鰾䱠長七八寸骨柔無鱗類錢之半有五色文白鰾形圓薄類錢一名金錢鰾丁斑魴鮃溪斑重唇疊甲丁斑大如指長二三寸身有花文紅緑相間尾鮮紅有黃點善鬬人家盆中畜之一名鬬魚養成半載尾上起鬐長寸許魴鮃大如拇指有五色溪斑黃質黑斑身圓鱗細大者長五六寸重唇頭大尾小無鱗長三寸許生石穴中疊甲身圎長四五寸鱗有兩重無味銀魚麵條漿魚白沫銀魚口尖身鋭瑩白如銀條麵條似銀魚而極大一名白飯魚漿似麵條而嘴小白沫梅雨時海水凝沫而成形雪色無骨其大如筯薧之味厚名丁香魺鰔魚錢串鰔狀似鯈其喙如針錢串身長而小嘴長五六寸青色亦名青針海燕飛魚海燕形如飛燕有肉翅能奮飛海上飛魚頭大尾小有肉翅一躍十餘丈白魚黃魚鰦竹魚大面白魚板身色白頭昂多細鯁大者六七尺生江中黃魚身扁薄而多鯁色黃鰦頭微而小扁竹魚身甚薄大面板身濶二三寸尾無鱗鏡魚圓眼鏡魚眼圓如鏡水上翻轉如車亦名翻車魚圓眼口尖眼圎而赤黃彡黃耍魚金鮐寸金黃彡鱗細黃赤色黃鬛黃色耍魚厥狀纎細名黃絲耍金鮐尾脊有細鱗金色寸金長寸許黃色出寧德縣七都火魚緋魚火魚隨潮蔽江結陳而來故名按興化志不載魚形色但云結陳而來則火字當作夥緋魚色如緋宋志云緋魚色如緋今海上有一種紅桃魚全緋又一種新婦魚近緋二者不知何指補疏白刀鱱白澤白刀白鱗形似刀生江河間身長鱗白鱱大者長五六寸白質黑章味美少鯁白澤海物異名記云羣生隨波潮縮在澤鯖鯷鱅鯶鯖鯷背青身長一名青魚鱅雌生卵雄吞之成魚青色無鱗一名松魚鯶色微黑一名鯤楓葉琵琶鹿角楓葉海物異名記云海樹霜葉風飄浪翻腐若螢化厥質為魚琵琶身扁狀似琵琶無鱗生南越者長二丈述異記云海魚千嵗為劍魚鹿角海物異名記曰芒角持戴在鼻小者醃為鮓味佳大者長五六寸其皮可以角錯抱石石伏抱石出於山溪背偃而腹平大如指常貼於石上土人取以為臘石伏伏於溪下魚土蟀無皮鱗嶺南呼為綿魚土蟀形如蚯蚓蠱鮐鯏骰魚蠱鮐尾有腥多穴於田塍或泥岸中鯏一名蚶魚味不佳骰細如米粒可鮓長樂所産春月最多即魚苗之大者土人名舜思魚䱀魚鬬潮䱀魚海産其類甚衆皆可食鬬潮乘波霧集蝦蝦魁稻蝦蝦姑對蝦白蝦赤尾草蝦塗苗梅蝦子金鈎蘆蝦蚣海蜈蝦魁嶺表異録云前兩腳大如人指長尺餘上有芒刺銛硬手不可觸腦殼微有錯身彎環亦長尺餘熟之鮮紅色一名蝦杯俗呼龍蝦按閩部疏云海味重於天下者稱西施舌江珧柱泉漳間皆有之而苦不稱美其他鱗介殊狀異態多不可名而最竒者龍蝦置盤中猶蠕動長可一尺許其鬚四繚長半其身目睛凸出上隱起二角負介昂藏體似小龍尾後吐紅子色奪榴花真竒種也蝦姑形如蜈蚣能食諸蝦白蝦生江浦中郡城南有白蝦浦草蝦頭大身促前兩足大而長生池澤中梅蝦梅雨時出洲渚間蘆蝦是蘆葦所變味甘美鮓之尤妙國初曽進貢稻蝦是稻花所變對蝦土人臘之兩兩對插以寄逺赤尾蝦之小者即天津之滷蝦塗苗海物異名記謂之醬蝦細如針芒海濱人醎以為醬不及南通州出長樂港尾者佳梅花所者不中金鈎子小於赤尾晒乾淡者佳海蜈蚣狀類蝦姑産興化海中土人取之切以為膾食補疏按蝦其種不一而肉味同諸蝦以蝦魁為第一此外又有涼蝦等不能盡録鯪鯉鯪鯉一名穿山甲似鯉而有四足鱗甲堅厚常吐舌出涎須螻蟻滿其上乃卷而食之蝦蟆蟾蜍大約雨蛤石鱗蝦蟆大如拇指微黃腹白生草澤間其鳴咿呷蟾蜍皮皺色黑頭腹大而腳細好伏墻陰下大約青背黃脊一路微黑腹平而色黃褐嘴尖當項兩傍有白圈雨蛤一名雨鬼形如蝦蟆大如小拇指天將雨則鳴按自蝦蟆至石鱗凡五種皆陸産而蟾蜍絶夀有至千嵗者五月五日得之謂之辟兵古稱月中有蟾蜍也石鱗神物閩人珍以為上品故别論石鱗生髙山深澗中皮斑肉白味美晝伏竇中夜居山頭石頂最髙處捕者不可預相告語密以黃厯首一葉納諸竈中即抱松明措火而去緣崖扱石以火照之見火輒醉不動十不脫一閩人飲饌以此為佳品俗名石魚又曰谷凍按石鱗似水雞而巨肉嫩骨粗而脆水雞似石鱗而小肉粗骨細而軟望火投明此類性之常也而云見火輒醉不動非也往豫聞閩人言石鱗靈物人往捕執炬出門禁毋相告至彼可獲否則俱匿矣炬至鱗羣坐石上觀火不動以是盡得之何獨靈於聞聲而昧於觀火耶水雞尖嘴蛤青約青魻黃魻水雞似石鱗而小色黃皮皺頭大嘴短其鳴甚壯如在甕中尖嘴蛤背黃脊一路微黑腹大聲微白色似水雞而小青約身青嘴尖脊一路微黑腹細而白青魻一名蛙黃魻類水雞按自水雞至黃魻凡五種皆水産而水雞可食味不及石鱗黃魻可食味不及水雞閩人惟食石鱗水雞而黃魻等種則皆不食之也閩中海錯疏卷中
