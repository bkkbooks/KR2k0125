body:
  text: 閩中海錯疏巻下明屠本畯撰介部龜龜外骨内肉腸屬於首廣肩背微坼如皺其文應八卦脇肋有文應二十四氣無雄與蛇為牝牡卵生不咽粟善藏乆能行氣水陸皆有按龜與蛇合故曰𤣥武羅碩曰靈龜文五色似玉似金背陰向陽上隆象天下平象地槃衍象山四趾轉運應四時文著象二十八宿蛇頭龍翅左精象日右精象月千嵗之化下氣上通能知存亡吉凶之變千年之龜游於苓葉之上苓今甘草也葉圎小而有刺言龜乆而神靈能變形大小也今人見小龜以為千嵗非也逸禮云龜三千嵗游於巻荷之上化書曰牝牡之道龜龜相顧神交也鶴鶴相唳氣交也言龜雖與蛇合亦與神交崔豹古今注曰龜一名黑衣督郵鼈鼈一名團魚一名脚魚卵生形圎穹脊連脇四周有帬外肉内骨而以眼聽行蹣跚以蛇為雄頸中有軟骨與鼈相似名曰醜食時當剔去之不可與莧同食按鼈隨日光所轉朝首東嚮夕首西嚮鼈之所在上有浮沫謂之鼈津捕者以是得之與龜皆隔津望卵而生故曰龜思鼈望養魚經曰魚滿三百六十則蛟龍將魚飛去納鼈則不復去故曰神守蠏毛蠏螃蜞金錢蠏虎獅石鹽桀歩蟛􅒹海蟳金蟳虎蟳蘆禽塗蜥蠘千人擘蠏八跪二螯堅殻其行郭索八足折而容俯故謂之跪兩螯倨而容仰故謂之螯制字从解以隨潮解甲也殻上多作十二㸃深胭脂色亦猶鯉之三十六鱗月盛腹中肉虚月衰腹中肉滿臍尖者牡團者牝毛蠏青黒色螯足皆有毛金錢蠏形如大錢中黄最飽酒之味佳補疏石鹽狀如蟛蜞而長不及寸廣僅半之土人治以薦酒殻堅味鹹寒醫家取以治目眚蟛􅒹似石蠏而小微黄色左螯大而無毛其行斜傍螃蜞似蟛􅒹而大右螯小而赤生溝渠中虎獅形似虎頭有紅赤斑㸃螫扁與爪皆有毛桀步一名擁劍横行螯大小不一以大者鬬小者食一名執火以其螯赤也一名掲哺子海蟳蝤蛑也長尺餘殻圓色青兩螯至强能與虎鬬金蟳色黄虎蟳文有虎斑蘆禽形似蟛􅒹生海畔補疏塗􅔼俗呼塗蜞産長樂補疏按閩部疏云蠏之别種曰蝤蛑吾地名黄甲此名海蟳特多此種而蠏乃為異狀不中食此又一種非真蠏也獨興化數里河中有蠏形味似吳中而土人不之重豈日厭海錯不能别味耶蠘似蠏而大殻兩傍尖出而多黄螯有稜鋸利截物如剪故曰蠘折其螯隨復更生故曰龍易骨蛇易皮鹿麋易角蠏易螯二三月應候而至膏滿殻子滿臍過是則味不及矣千人擘狀如蝦姑殻堅硬人盡力擘之不開海物異名記云千人擘聚刺獷殻擘不能開酉陽雜俎謂之千人揑蚶珠蚶絲蚶蚶殻厚有稜狀如屋上瓦壠肉紫色大或專車殻可為器珠蚶蚶之極細者形如蓮子而扁按四明蚶有二種一種人家水田中種而生者一種海塗中不種而生者曰野蚶殻緇色而大肉紉醫書取殻入藥名瓦壠子絲蚶殻上有文如絲色微黑比珠蚶稍大産長樂縣蛤蜊赤蛤文蛤海紅海蛤螂沙蝨蜞螂紅綠沙蛤土銚紅栗白蛤車螯螯白蛤蜊殻白厚而圎肉如車螯蛤蜊止消渇開胃氣解酒毒以蘿蔔煮之其柱易脫補疏赤蛤殻上有花文赤色海紅形類赤蛤而大螂形似蛤蜊而白合口處色黑俗呼為懶績麻蜞螂似蛤蜊沙蛤土匙也産吳航似蛤蜊而長大有舌白色名西施舌味佳按閩部疏云海錯出東四郡者以西施舌為第一蠣房次之西施舌本名車蛤以美見嗜出長樂澚中紅栗似蛤而小色白而微紅文蛤殻有文理唐時嘗充土貢有名補疏海蛤其殻乆為風濤所洗自然圎淨補疏沙蝨似螂而殻差薄紅綠似蛤而小味美土銚一名沙屑殻薄而綠色有尾而白色味佳白蛤一名空豸泉人呼為江大似蛤而小殻薄色白又名泥星按蛤其種不一而味皆同南海志云蛤一月生一暈南越志云凡蛤之屬開口聞雷鳴則不復閉車螯陳藏器云大蛤也殻有花文肉白色大者如碟小者如拳螯白車螯之最小者也按閩部䟽云陶方伯嘗言閩中海錯蚶不四明蛤不揚州蠏不三吳余大以為然蚶大而不種故不佳蛤乃車螯非蛤蜊也蠣房草鞋蠣黄蠣蠣房一名牡蠣出海島麗石而生其殻磈礧相粘如房嶺表異録謂之蠔山地無石灰者燒蠣殻為之草鞋蠣生海中大如盃漁者以繩繫腰入水取之黄蠣五六月有之大於蠣房數倍味雖不如蠣房而汁亦適口但牡蠣可為醬此不堪醃耳補疏殻菜沙箭烏投烏江珧柱殻菜一名淡菜一名海夫人生海石上以苔為根殻長而堅硬紫色味最珍生四明者肉大而肥閩中者肉瘦其乾者閩人呼曰幹四明呼為乾肉殻菜形似珠母一頭尖中銜少毛號東海夫人本草云形雖不典而甚益人補疏沙箭淡菜之小者烏似淡菜而極小中無毛鳥投味甘似烏而殻堅中有毛按殻菜生四明者殻黒而厚形如斧頭形醜而味美本草云海中有物其形如牝紅者補血白者補腎今閩中取以煮湯治痢疾江珧柱一名馬甲柱海物異名記云厥甲美如瑶玉肉柱膚寸名江珧柱按江珧殻色如淡菜上銳下平大者長尺許肉白而紉柱圎而脆沙蛤之美在舌江珧之美在柱四明奉化縣者佳蜯蛤青蜆翠翠蜯蛣也肉如蛤蜊殻厚而長腹中有蠏子如榆莢合體共生時出取食復入殻中一名璅蛣生於曲岸中故曰蛣蛤青似蜯而殻薄青色蜆似蜯而小色黄殻薄俗謂之蟟有黄蟟土蟟之别大江者可食他小浦中有之有土氣不堪用補疏翠翠似蜯而殻翠海月石華石帆沙筯海月形圎如月亦謂之蠣鏡土人多磨蠣其殻使之通明鱗次以盖天窓本草云水沫所化煮時猶化為水嶺南謂之海鏡又曰明瓦按海月嶺表異録云廣人呼為膏葉兩片合以成形殻圎中甚瑩滑白照如雲母光内有小肉如蜯蛤腹中有蠏子甚小頭黄而螯足具備海鏡饑則蠏出拾食蠏飽腹滿海鏡亦飽或近之以火則蠏子走出離腸腹立斃或生剖之有蠏子活在腹中逡巡亦斃石華附石而生方言謂之石雹肉如蠣房殻如牡蠣而大可飾户牖天窓按謝靈運詩云挂席拾海月揚帆採石華其味與海月俱同蠣房石帆紫黒色枝柯相動連帶不絶生海上石穴中沙筯長尺餘其狀如簮故又名塗釵嶺表異録云生海岸沙中春時吐苗其心苦骨白而勁可為酒籌泥笋沙蠶土鑽泥笋其形如笋而小生江中形醜味甘一名土笋沙蠶似土笋而長土鑽似沙蠶而長龜脚䗩老蜯牙石磷龜脚一名石􅨒生石上如人指甲連支帶肉一名仙人掌一名佛手蚶春夏生苗如海藻亦有花生四明者肥美按石􅨒生海中石上如蠣房之附石也形如龜脚故名近甲處有軟爪黑色肉白味佳秋生冬盛來年正月得春雨軟爪開花如絲散在甲外郭璞江賦所稱石􅎕應節而揚葩是也䗩生海中附石殻如􅝤蹄殻在上肉在下大者如雀卵老蜯牙似䗩而味厚一名牛蹄以形似之石磷形如箬笠殻在上肉在下石決明海膽石榼寄生石決明附石而生惟一殻無對大者如手小者如兩三指旁有十數孔一說即鰒魚本草圗經云鰒魚别是一種與決明相近石決明俗名將軍帽温州與登州海中俱有之即名鰒魚温人醃用登人淡晒乾串入京餽遺補疏按閩部䟽云蠣房雖介屬附石乃生得潮而活凡海濵無石山溪無潮處皆不生余過莆迎仙寨橋時潮方落兒童羣下皆就石間剔取肉去殻連石不可動或留之仍能生其生半與石俱情在有無之間殆非蛤蜊比也後漢書鰒魚註云鰒無鱗有殻一面附石細孔雜雜或七或九即以狀蠣房何所不可南蠣北鰒是故造化介生别搆海膽殻圎如盂外結宻刺内有膏黄色土人以為醬按海膽四明謂之海績筐海濵人取殻磨粉合米醬中其膏入鹽按酒亦名曰醬石榼形圓色黄肉紫有刺人觸之則刺動摇寄生海上枯蠃殻存者寄生其中負殻而走形如蠏四足兩螯大如榆莢其味若蝦得之者不煩剔取曳之即出以肉不附也炒食味亦脆美蟶竹蟶蟶玉筯蟶生海泥中大如指長三寸許肉白殻薄兩頭稍開竹蟶似蟶而長大殻厚玉筯蟶似蟶而小三月麥熟時最盛以其形如麥稿又名麥稿蟶鱟鱟形圎如熨斗如便面如恵文冠廣尺許有刺頭如蜣螂而骨眼眼在背上背青黒色而穹其血蔚藍熟之純白而肉甚甘美當脊一行兩旁亦刺殻覆身上腹下十二足長五六寸環口而生尾銳而長觸之能刺斷而置地其行郭索雌嘗負雄捕得其雄雌亦就斃雄少肉雌多子子如綠豆大而黄色布滿骨骼中東浙閩廣人重之以為鮓謂之鱟子醬殻可屈為杓轑釜輒盡尾可為如意鱟口足皆在覆斗之下海中毎雌負雄漁必雙得之以竹編為一甲鬻焉本草云牝牡相隨牝者背上有目牡者無目牡得牝始行牝去牡死其尾燒烟可辟蚊蚋韓退之詩鱟實如恵文骨眼相附行補疏按便面古扇婦人取以障面者恵文秦漢以來武冠侍中中常侍則加金璫貂蟬之飾謂之趙恵文冠盖狀鱟形也鱟産子時先往石邊周身擦之罅裂而生雌嘗負雄故獲必得雙其相負乗也雖風濤終不解謂之鱟媚過海輒相負於背髙尺餘乗風游行如帆謂之鱟帆其衆如㵺栰謂之鱟㵺其善候風故音如候也埤雅云鱟性畏蚊蚊小螫之輒斃未知其故又暴之日往往無恙隙光射之即死嶺表異錄云雄小雌大置之水中雄者浮雌者沈螺香螺鸚鵡鈿螺泥螺紫背米螺香螺大如甌長數寸其揜雜衆香燒之使益芳獨燒則臭諸螺之中此螺味最厚本草謂之甲香鈿螺光彩如鈿可飾鏡背紫背紫色有斑㸃俗謂之砑螺鸚鵡螺狀如鸚鵡堪作酒盃泥螺一名土鐵一名麥螺一名梅螺殻似螺而薄肉如蝸牛而短多涎有膏按泥螺産四明鄞縣南田者為第一春三月初生極細如米殻軟味美至四月初旬稍大至五月内大脂膏滿腹以梅雨中取之為梅螺可乆藏酒浸一兩宿膏溢殻外瑩若水晶秋月取者肉硬膏少味不及春閩中者肉礧磈無脂膏不中食米螺小粒似米肉可食螺田螺馬蹄溪螺指甲黄螺江橈紅螺鴝鵒蓼螺花螺梭尾竹螺油螺莎螺醋螺田螺似黄螺而差小生水田中溪螺似田螺差小而長黄螺殻硬色黄味美其黑而微刺者尤佳紅螺肉可為醬蓼螺大如拇指有刺味辛如蓼梭尾殻細而長文如雕鏤味佳馬蹄形似故名指甲以形似名之江橈指甲之大者鴝鵒螺殻小而厚黒色土人端午用之花螺圎而扁殻有斑㸃味勝黄螺竹螺殻文麄而尾脆味清香油螺形如花螺殻柔鹽之味美産興化補疏醋螺出洪塘江去殻醃其肉味佳補疏莎螺形如竹螺味微苦尾極脆補疏按螺其種不一而肉多同惟殻異此外若石螺螺螄種種不能悉録龍蝨龍蝨似螥蜋而小黒色兩翅六足秋月暴風起從海上飛來落水田或池塘海濱人撈取油鹽製藏珍之按龍蝨類水蟲但龍蝨來自海外水蟲出自水中故以為異閩人言是龍身上蝨或然耳外省人罕食閩中海錯疏巻下
