body:
  text: 閩中海錯疏卷下明屠本畯撰介部龜龜外骨內肉腸屬於首廣肩背微坼如皺其文應八卦脅肋有文應二十四氣無雄與蛇為牝牡卵生不咽粟善藏久能行氣水陸皆有按龜與蛇合故曰玄武羅碩曰靈龜文五色似玉似金背陰向陽上隆象天下平象地槃衍象山四趾轉運應四時文著象二十八宿蛇頭龍翅左精象日右精象月千嵗之化下氣上通能知存亡吉凶之變千年之龜遊於苓葉之上苓今甘草也葉圎小而有刺言龜久而神靈能變形大小也今人見小龜以為千嵗非也逸禮云龜三千嵗遊於卷荷之上化書曰牝牡之道龜龜相顧神交也鶴鶴相唳氣交也言龜雖與蛇合亦與神交崔豹古今注曰龜一名黑衣督郵鱉鱉一名團魚一名腳魚卵生形圎穹脊連脅四周有裙外肉內骨而以眼聽行蹣跚以蛇為雄頸中有軟骨與鱉相似名曰醜食時當剔去之不可與莧同食按鱉隨日光所轉朝首東嚮夕首西嚮鱉之所在上有浮沫謂之鱉津捕者以是得之與龜皆隔津望卵而生故曰龜思鱉望養魚經曰魚滿三百六十則蛟龍將魚飛去納鱉則不復去故曰神守蟹毛蟹螃蜞金錢蟹虎獅石鹽桀步蟛􅒹海蟳金蟳虎蟳蘆禽塗蜥蠘千人擘蟹八跪二螯堅殼其行郭索八足折而容俯故謂之跪兩螯倨而容仰故謂之螯制字從解以隨潮解甲也殼上多作十二點深胭脂色亦猶鯉之三十六鱗月盛腹中肉虛月衰腹中肉滿臍尖者牡團者牝毛蟹青黑色螯足皆有毛金錢蟹形如大錢中黃最飽酒之味佳補疏石鹽狀如蟛蜞而長不及寸廣僅半之土人治以薦酒殼堅味鹹寒醫家取以治目眚蟛􅒹似石蟹而小微黃色左螯大而無毛其行斜傍螃蜞似蟛􅒹而大右螯小而赤生溝渠中虎獅形似虎頭有紅赤斑點螫扁與爪皆有毛桀步一名擁劍橫行螯大小不一以大者鬬小者食一名執火以其螯赤也一名揭哺子海蟳蝤蛑也長尺餘殼圓色青兩螯至強能與虎鬬金蟳色黃虎蟳文有虎斑蘆禽形似蟛􅒹生海畔補疏塗􅔼俗呼塗蜞産長樂補疏按閩部疏云蟹之别種曰蝤蛑吾地名黃甲此名海蟳特多此種而蟹乃為異狀不中食此又一種非真蟹也獨興化數里河中有蟹形味似吳中而土人不之重豈日厭海錯不能别味耶蠘似蟹而大殼兩傍尖出而多黃螯有稜鋸利截物如剪故曰蠘折其螯隨復更生故曰龍易骨蛇易皮鹿麋易角蟹易螯二三月應候而至膏滿殼子滿臍過是則味不及矣千人擘狀如蝦姑殼堅硬人盡力擘之不開海物異名記云千人擘聚刺獷殼擘不能開酉陽雜俎謂之千人揑蚶珠蚶絲蚶蚶殼厚有稜狀如屋上瓦壠肉紫色大或專車殼可為器珠蚶蚶之極細者形如蓮子而扁按四明蚶有二種一種人家水田中種而生者一種海塗中不種而生者曰野蚶殼緇色而大肉紉醫書取殼入藥名瓦壠子絲蚶殼上有文如絲色微黑比珠蚶稍大産長樂縣蛤蜊赤蛤文蛤海紅海蛤螂沙蝨蜞螂紅緑沙蛤土銚紅栗白蛤車螯螯白蛤蜊殼白厚而圎肉如車螯蛤蜊止消渴開胃氣解酒毒以蘿蔔煮之其柱易脫補疏赤蛤殼上有花文赤色海紅形類赤蛤而大螂形似蛤蜊而白合口處色黑俗呼為懶績麻蜞螂似蛤蜊沙蛤土匙也産吳航似蛤蜊而長大有舌白色名西施舌味佳按閩部疏云海錯出東四郡者以西施舌為第一蠣房次之西施舌本名車蛤以美見嗜出長樂澚中紅栗似蛤而小色白而微紅文蛤殼有文理唐時嘗充土貢有名補疏海蛤其殼久為風濤所洗自然圎淨補疏沙蝨似螂而殼差薄紅緑似蛤而小味美土銚一名沙屑殼薄而緑色有尾而白色味佳白蛤一名空豸泉人呼為江大似蛤而小殼薄色白又名泥星按蛤其種不一而味皆同南海志云蛤一月生一暈南越志云凡蛤之屬開口聞雷鳴則不復閉車螯陳藏器云大蛤也殼有花文肉白色大者如碟小者如拳螯白車螯之最小者也按閩部疏云陶方伯嘗言閩中海錯蚶不四明蛤不揚州蟹不三吳余大以為然蚶大而不種故不佳蛤乃車螯非蛤蜊也蠣房草鞋蠣黃蠣蠣房一名牡蠣出海島麗石而生其殼磈礧相粘如房嶺表異録謂之蠔山地無石灰者燒蠣殼為之草鞋蠣生海中大如杯漁者以繩繫腰入水取之黃蠣五六月有之大於蠣房數倍味雖不如蠣房而汁亦適口但牡蠣可為醬此不堪醃耳補疏殼菜沙箭烏投烏江珧柱殼菜一名淡菜一名海夫人生海石上以苔為根殼長而堅硬紫色味最珍生四明者肉大而肥閩中者肉瘦其乾者閩人呼曰幹四明呼為乾肉殼菜形似珠母一頭尖中銜少毛號東海夫人本草云形雖不典而甚益人補疏沙箭淡菜之小者烏似淡菜而極小中無毛鳥投味甘似烏而殼堅中有毛按殼菜生四明者殼黑而厚形如斧頭形醜而味美本草云海中有物其形如牝紅者補血白者補腎今閩中取以煮湯治痢疾江珧柱一名馬甲柱海物異名記云厥甲美如瑶玉肉柱膚寸名江珧柱按江珧殼色如淡菜上鋭下平大者長尺許肉白而紉柱圎而脆沙蛤之美在舌江珧之美在柱四明奉化縣者佳蚌蛤青蜆翠翠蚌蛣也肉如蛤蜊殼厚而長腹中有蟹子如榆莢合體共生時出取食復入殼中一名璅蛣生於曲岸中故曰蛣蛤青似蚌而殼薄青色蜆似蚌而小色黃殼薄俗謂之蟟有黃蟟土蟟之别大江者可食他小浦中有之有土氣不堪用補疏翠翠似蚌而殼翠海月石華石帆沙筯海月形圎如月亦謂之蠣鏡土人多磨蠣其殼使之通明鱗次以蓋天窗本草云水沫所化煮時猶化為水嶺南謂之海鏡又曰明瓦按海月嶺表異録云廣人呼為膏葉兩片合以成形殼圎中甚瑩滑白照如雲母光內有小肉如蚌蛤腹中有蟹子甚小頭黃而螯足具備海鏡飢則蟹出拾食蟹飽腹滿海鏡亦飽或近之以火則蟹子走出離腸腹立斃或生剖之有蟹子活在腹中逡巡亦斃石華附石而生方言謂之石雹肉如蠣房殼如牡蠣而大可飾户牖天窗按謝靈運詩云挂席拾海月揚帆採石華其味與海月俱同蠣房石帆紫黑色枝柯相動連帶不絶生海上石穴中沙筯長尺餘其狀如簮故又名塗叉嶺表異録云生海岸沙中春時吐苗其心苦骨白而徑可為酒籌泥笋沙蠶土鑽泥笋其形如笋而小生江中形醜味甘一名土笋沙蠶似土笋而長土鑽似沙蠶而長龜腳䗩老蚌牙石磷龜腳一名石􅨒生石上如人指甲連支帶肉一名仙人掌一名佛手蚶春夏生苗如海藻亦有花生四明者肥美按石􅨒生海中石上如蠣房之附石也形如龜腳故名近甲處有軟爪黑色肉白味佳秋生冬盛來年正月得春雨軟爪開花如絲散在甲外郭璞江賦所稱石􅎕應節而揚葩是也䗩生海中附石殼如􅝤蹄殼在上肉在下大者如雀卵老蚌牙似䗩而味厚一名牛蹄以形似之石磷形如箬笠殼在上肉在下石決明海膽石榼寄生石決明附石而生惟一殼無對大者如手小者如兩三指旁有十數孔一説即鰒魚本草圗經云鰒魚别是一種與決明相近石決明俗名將軍帽溫州與登州海中俱有之即名鰒魚溫人醃用登人淡晒乾串入京餽遺補疏按閩部疏云蠣房雖介屬附石乃生得潮而活凡海濵無石山溪無潮處皆不生余過莆迎仙寨橋時潮方落兒童羣下皆就石間剔取肉去殼連石不可動或留之仍能生其生半與石俱情在有無之間殆非蛤蜊比也後漢書鰒魚注云鰒無鱗有殼一面附石細孔雜雜或七或九即以狀蠣房何所不可南蠣北鰒是故造化介生别搆海膽殼圎如盂外結密刺內有膏黃色土人以為醬按海膽四明謂之海績筐海濵人取殼磨粉合米醬中其膏入鹽按酒亦名曰醬石榼形圓色黃肉紫有刺人觸之則刺動搖寄生海上枯螺殼存者寄生其中負殼而走形如蟹四足兩螯大如榆莢其味若蝦得之者不煩剔取曳之即出以肉不附也炒食味亦脆美蟶竹蟶蟶玉筯蟶生海泥中大如指長三寸許肉白殼薄兩頭稍開竹蟶似蟶而長大殼厚玉筯蟶似蟶而小三月麥熟時最盛以其形如麥稿又名麥稿蟶鱟鱟形圎如尉斗如便面如惠文冠廣尺許有刺頭如蜣螂而骨眼眼在背上背青黑色而穹其血蔚藍熟之純白而肉甚甘美當脊一行兩旁亦刺殼覆身上腹下十二足長五六寸環口而生尾鋭而長觸之能刺斷而置地其行郭索雌嘗負雄捕得其雄雌亦就斃雄少肉雌多子子如緑豆大而黃色布滿骨骼中東浙閩廣人重之以為鮓謂之鱟子醬殼可屈為杓轑釜輒盡尾可為如意鱟口足皆在覆斗之下海中每雌負雄漁必雙得之以竹編為一甲鬻焉本草云牝牡相隨牝者背上有目牡者無目牡得牝始行牝去牡死其尾燒煙可辟蚊蚋韓退之詩鱟實如惠文骨眼相附行補疏按便面古扇婦人取以障面者惠文秦漢以來武冠侍中中常侍則加金璫貂蟬之飾謂之趙惠文冠蓋狀鱟形也鱟産子時先往石邊周身擦之罅裂而生雌嘗負雄故獲必得雙其相負乘也雖風濤終不解謂之鱟媚過海輒相負於背髙尺餘乘風遊行如帆謂之鱟帆其衆如㵺筏謂之鱟㵺其善候風故音如候也埤雅云鱟性畏蚊蚊小螫之輒斃未知其故又暴之日往往無恙隙光射之即死嶺表異録云雄小雌大置之水中雄者浮雌者沈螺香螺鸚鵡鈿螺泥螺紫背米螺香螺大如甌長數寸其掩雜衆香燒之使益芳獨燒則臭諸螺之中此螺味最厚本草謂之甲香鈿螺光彩如鈿可飾鏡背紫背紫色有斑點俗謂之砑螺鸚鵡螺狀如鸚鵡堪作酒杯泥螺一名土鐵一名麥螺一名梅螺殼似螺而薄肉如蝸牛而短多涎有膏按泥螺産四明鄞縣南田者為第一春三月初生極細如米殼軟味美至四月初旬稍大至五月內大脂膏滿腹以梅雨中取之為梅螺可久藏酒浸一兩宿膏溢殼外瑩若水晶秋月取者肉硬膏少味不及春閩中者肉礧磈無脂膏不中食米螺小粒似米肉可食螺田螺馬蹄溪螺指甲黃螺江橈紅螺鴝鵒蓼螺花螺梭尾竹螺油螺莎螺醋螺田螺似黃螺而差小生水田中溪螺似田螺差小而長黃螺殼硬色黃味美其黑而微刺者尤佳紅螺肉可為醬蓼螺大如拇指有刺味辛如蓼梭尾殼細而長文如雕鏤味佳馬蹄形似故名指甲以形似名之江橈指甲之大者鴝鵒螺殼小而厚黑色土人端午用之花螺圎而扁殼有斑點味勝黃螺竹螺殼文粗而尾脆味清香油螺形如花螺殼柔鹽之味美産興化補疏醋螺出洪塘江去殼醃其肉味佳補疏莎螺形如竹螺味微苦尾極脆補疏按螺其種不一而肉多同惟殼異此外若石螺螺螄種種不能悉録龍蝨龍蝨似螥蜋而小黑色兩翅六足秋月暴風起從海上飛來落水田或池塘海濱人撈取油鹽製藏珍之按龍蝨類水蟲但龍蝨來自海外水蟲出自水中故以為異閩人言是龍身上蝨或然耳外省人罕食閩中海錯疏卷下
