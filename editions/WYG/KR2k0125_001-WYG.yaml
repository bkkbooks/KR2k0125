body:
  text: 閩中海錯䟽巻上明屠本畯撰鹺大夫曰鱗介之品山海錯雜先王以是任土作貢貿遷有無乃立冬官川衡掌巡川澤之禁令而平其守辨其品物腥臊珍異以為祭祀燕享奠其庶羞胾腊燔炙以為鼎俎饋遺所由來逺矣畯鹺丞也何預海錯苐漢唐司農府𨽻於冬官山澤之禁亦所當領作海錯䟽鱗部上鯉黄尾大姑金鯉鱧鯉頳鯉也當脇正中一行自首至尾無大小皆三十六鱗鱗上皆有黒㸃文按鯉能變化飛越山海死不反白魚之健而神者也龍陽也具九九八十一鱗鯉隂也備六六三十六數魚躍龍門過而為龍惟鯉或然是以仙人乗龍亦或騎鯉黄尾似鯉而尾微黄食之微有土氣大姑似鯉而差小大鱗有脊骨無細鯁冬月子肥味美生湖塘間四明謂之宻姑金鯉色紅黄大姑生子為日所晒而成鱧文魚也一名烏鯉圎長而斑首有七㸃作北斗象肉美膽甘無鱗夜則昂首北嚮嶺南謂之𤣥鱧鱧魚毛詩注鮦也細鱗有黒花紋本草注云蠣蛇所變然亦有相生者諸魚中惟此魚膽甘可食補疏按鱧夜仰首北嚮有自然之禮制字从禮惟膽甘制字从醴惟肉美古人所重惟首戴斗象道家指以為厭盖天厭鴈地厭犬水厭鱧皆禁而不食夫鱧胎生還復自食其鯢梟食父獍食母鱧便食子凡鱧一尾入人家池塘食小魚殆盡人每惡而逐之鯽金鯽烏魚金篐棘鬛赤䰂烏頰方頭鯽鮒也似鯉體促腹大脊隆肉厚色白而微黑按酉陽雜俎云東南海中鯽魚長八尺食之宜暑而避風潯陽青林湖中大者亦二尺食之可止寒熱羅碩云此魚旅行吹沫如星以其相即也謂之鯽以其相附也謂之鮒金鯽能變幻可畜盆中供玩閩人呼為盆魚烏魚似鯽而大尾鬛俱黒力能跋扈金篐魚三尾色如硃砂盆魚中品之佳者補疏棘鬛似鯽而大其鬛如棘色紅紫嶺表異錄名吉鬛泉州謂之鬐鬛又名竒鬛赤鬃似棘鬛而大鱗鬛皆淺紅色宋志云棘鬛與赤鬃味豐在首首味豐在眼葱酒蒸之為珍味十月此魚得時正月以後則味拗不可食補疏方頭似棘鬛而頭方味美通志云方頭似棘鬛而頭方或云方當作芳言其頭為味芳香也補疏烏頰形與竒鬛相同二魚俱於隆冬大寒時取之然竒鬛之味在首魴䱽魴青鯿也板身銳口縮項穹脊博腹細鱗色青白而味美不減槎頭一名貼沙又名鯿魚按魚貼沙而行魚之弱者也漢水中常以槎斷水用禁人捕謂之槎頭䱽似鯿腦上凸起連背而圎身肉白而甚厚尾如燕子只一脊骨而無他鯁鯋虎鯋劍鯋鋸鯋烏鬐狗鯋鯋出入烏頭時鯋胡鯋帽鯋鮫鯋黄鯋虎鯋頭目凹而身有虎文鋸鯋上唇長三四尺兩傍有齒如鋸狗鯋頭如狗烏頭頰尾黑背大有百餘斤者淺在海沙不能去人割其肉潮至復去其皮用湯泡淨沙縷作膾鬐鬛泡去外皮存絲亦用作膾色晶瑩若銀絲胡鯋青色背上有沙大者長丈餘小者長三五尺鼻如鋸皮可縷為膾薧以為脩可充物亦名鋸鯋鮫鯋似蛟而鼻長皮可飾劍靶俗呼錦魟劍鯋尾長似劍薧鮝味佳烏鬐頰尾皆黑出入鯋初生隨母浮遊遇警從母口中入腹須臾復出時鯋有肉無腹大者刳其肉烹之多油可啖亦可燃帽鯋腮兩邊有皮如戴帽然又名雙髻鯋頭如木柺又名雙髻魟黄鯋好食百魚大者五六百斤按鯋之種類不一皮肉皆同惟頭稍異此外又有青鯋淡鯋夾鯋諸種種而吹鯋别是一種故列在下文類鯋故附吹鯋吹鯋大如指狹圎而長身有黑㸃常張口吹沙按吹沙小魚也味甚美故魚麗之詩稱焉羅碩曰非特吹沙亦止食沙大者不過二斤江南小谿中每春沙至甚多土人珍之夏則隨水而下自是以後時亦有之然罕至矣春來復舉大抵正月輒至魚之㝡先者次則鯉至次則鱖至桃花水至而鱖肥則三月矣此魚生流水中非畜於人背有肉二片乾之名金絲鮝形味俱類沙魚翅鱂鯧蠟斗底鯧黄樟鱂板身口小項縮肥腴而少鯁鯧鱂之小者其形匾斗底鯧鱂之小者其形圎黄蠟樟亦鯧也鱗金㸃而差厚按魚以鯧名以其性善婬好與羣魚為牝牡故味美有似乎娼制字从昌鮆鮆頭長而狹腹薄而腴多鯁脊如刀刃故謂之刀鮆按鮆山海經云食之可以已妬與石首皆以三月八月出故江賦云鯼鮆順時而往還鱖鱸􅴊鱖巨口細鱗鬐鬛皆圎黄質黒章皮厚肉緊味美如鱸其斑文鮮眀色著者為雄稍晦昧者為雌按鱖音桂舊說仙人劉憑食石桂魚今之鱖魚是此魚所化猶有桂名漁人以索貫一雄置谿畔羣雌皆來齧曳之不捨掣而取之常得十􅁆尾今福寧州呼為鱠魚羅碩曰凡牛羊之屬有肚故能嚼魚無肚不能嚼獨鱖魚有肚能嚼鱸類鱖肉肥味厚而二腮􅴊鱸之别種也漳泉皆有之按鱸江淮廣浙在在有之吳淞别有一種圎而短小巨口細鱗四腮淞江呼為四腮鱸鰵鰵形似鱸口濶肉粗腦腴骨脆而味美按鰵身類鱸口類石首大者長丈許重百餘斤四明諺曰寧可棄我三畝稻不可棄我鰵魚腦盖言美在腦也䰵撥尾鮶草魚鰱紅鰱烏鰡黄鰡䰵似烏魚而短身圎口小目赤鱗黑一名鯔味與鰣相似冬深脂膏滿腹至春漸瘦無味一名鮐撥尾䰵魚之小者子魚以至子月肥極故云其子尤佳莆田縣東北五十里迎仙橋下潭所産極為珍味補疏鮶似鯔而目大似鯉而鱗粗能以鬛刺水蛇食之草魚似鯔身圎而長以其畜於池塘飼之以草鰱口小鱗細色白紅鰱似鰱而色紅按草鰱二魚俱來自江右土人以仲春取子於江曰魚苖畜於小池稍長入塘曰可尺許徙之廣池飼以草九月乃取烏鰡形似草魚頭與口差小而黑色食螺黄鰡鱗色黄俱出邵武鰣鰳鰶江鰶黄炙鰣板身扁首燕尾青脊白鱗大者長􅁆尺肥腴多鯁春末有之又一種春漲泝流而上月長一寸至十月盈尺者佳鰳似鰣而多鯁按鰣鰳其美在腴鰣侈口圎脊多鯁大者長三四尺重七八斤鰳狹口劍脊多鯁大者長二三尺重三四斤鯔小口圎身少鯁大者長五六尺重二三十斤泉志云鰣與鰳形相似福志云鯔與鰣味相似俱誤鰶如鰣而小鱗青色俗呼青鯽又名青鱗按鰶四明奉化縣有之鱗脊俱青故名青鯽冬月味甘腴春月魚首生蟲漸瘦不堪食江鰶出洪塘江三四月方有之味美但小而多刺補疏黄炙似鰳而小多鯁細鱗味不甚佳石首黄梅石首鯼也頭大尾小無大小腦中俱有兩小石如玉鰾可為膠鱗黄璀璨可愛一名金鱗朱口厚肉極清爽不作腥閩中呼為黄瓜魚薧鮝不及四明黄梅石首之短小者也頭大尾細朱口細鱗長五六寸一名大頭魚亦名小黄瓜魚按黄魚首有二白石如棋子醫家取以治石淋肉能養胃鰾能固精醃糟食之已酒病四眀海上以四月小滿為頭水五月端午為二水六月初為三水其時生者名洋生魚其薧鮝也頭水者佳二水勝於三水八月出者名桂花石首臘月出者為雪亮其鰳魚出此時者名亦如之吳地志云石首魚至秋化為冠鳬今冠鳬頭中猶有石也形如石首而差大鱗細口紅鱓土龍地龍鰻狀鰻鱒鮎䱀䰲鱓似蛇無鱗黄質黒章體有涎沫生水岸泥窟中能雨水中上升夜則昂首北向一名泥猴按鱓形既似蛇又夏月於淺水作窟如蛇冬蟄夏出故亦名蛇鱓今閩中之鱓肉澁而味不及吳中漢書鸛雀銜三鱣鱣即鱔字或作鱓陶隠居謂荇芩根所化者又以為人髮所化今腹中有子未必盡是化生補疏土龍似鱓而小地龍似鱓而大多鯁脊中有一線血甚腥鰻似鱓而腹大有黄色有青色春生者毒産海中者相類而大土人名慈鰻又名猧狗魚海鰻之大者百餘斤小者二三斤鱺鰻之大者亦有八十餘斤肥美無比産在鹹淡水之介補疏按興化志云鰻肉滑鱓肉澁鰻脊骨圎鱓脊骨方埤雅云焚鰻骨可辟蠧魚有雌無雄以影漫鱧而生子趙辟公雜說曰凡以聒抱者鵂鶹鸛雀也以影抱者龜龞黿也有鰻鱺者以影漫于鱧魚則其子皆附鱧之鬐鬛而生故謂之鰻鱺也鰻鱺善攻碕岸便輒圮狀鰻生江水中頭似鰻而身似鱓味美多油中惟脊骨旁無他刺補疏鱒似鰻目中赤色一道横貫瞳食螺蚌好獨行按鱒好獨行制字从尊鱒讀如蹲詩九罭之魚鱒魴以魚美而稱之亦有兩三尾同行者鮎一名鯷偃額兩目上陳頭大尾小口方背青黑無鱗多涎䱀䰲似鮎而小邊有刺能螫人其聲䱀䰲本草名黄䫙至能醒酒䱀音于方切按䱀䰲四明謂之䱀䫙有三刺一生背上二生兩腮其刺取以發痘如神一說鮎亦産鰻盖乳子三分之二為鮎魚其一鰻也海鰌鰌魚泥鰌田魚海鰌最巨能吞舟日中閃鬐鬛若簸朱旗按海鰌噴沫飛洒成雨其來也移若山嶽乍出乍沒舟人相值必鳴金鼓以怖之布米以厭之鰌攸然而逝否則鮮不罹害間有斃沙上者土人梯而臠之刳其脂為油艌船甚佳鰌似鱓而短首尖而銳色黄無鱗以涎自染難握按鰌好與魚為牝牡制字从魚从酋薧鮝乃佳泥鰌産水田中大如指夏月最多鰍魚似鰌小大錯生吐涎最多補疏田似鰍而大鮮食味腥薧乾味美補疏比目鰈鯋比目狀如牛脾鱗細紫黑色一眼須兩魚相合乃行按比目閩廣謂之鞋底魚南粤謂之板魚又謂之箬葉鰈鯋形扁而薄邵武名鞋底魚又名漯沙按漯音撻魚在江中行漯漯也左目明右目晦昧今閩廣以此魚名比目蓋比目只一目必兩魚相合乃行而此魚獨行殊非比目也四明謂之江箬以形如箬故名又謂之箬漯以其行漯漯故名過臘過臘頭類鯽身類鱖又類鰱魚肉微紅味美尾端有肉口中有牙如鋸好食蚶蚌以臘來春去故名過臘按過臘四明謂之銅盆又名郭磚四時有之好入人家田中食蚶蚌入口殻輒碎亦猶鳬食螺雞食蜈蚣氣之制也閩中海錯疏卷上
