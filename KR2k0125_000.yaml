body:
  text: 閩中海錯疏地理類八雜記之屬提要臣等謹案閩中海錯疏三巻明屠本畯撰本畯字田叔鄞縣人以門蔭入仕官至福建鹽運同知是書詳誌閩海水族凡鱗部二巻共一百六十七種介部一巻共九十種又附非閩産而閩所常有者海粉燕窩二種後有自跋稱將入閩時太常少卿余公君房曰狀海錯來吾徵閩越而通之因疏以復云云君房者余寅之字與本畯同里為父執書中本畯所附案語多引四明土産以為證蓋即徵閩越而通之之意中間又有註補疏二字者則徐􅎾所續也其書頗與黄衷海語相近而敘述較備文亦簡核可取惟其詞過畧故徵引不能博贍舛漏亦所未免如鯊魚一條海語謂鯊有二種而此書列至十二種固可稱賅具然海語所謂海鯊虎頭鯊體常以春晦陟於海山旬日化而為虎者此書反遺之又海鰌一條海語謂其長亘百里牡蠣聚族其背曠嵗之積崇十許丈鰌負以遊峍屼水面如山其形容最為曲盡而此但以移若山嶽一語㮣之殊未明晰然其辨别名類一覽了然頗有益於多識要亦考地産者所不廢也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀閩中海錯疏原序夫海物惟錯職貢齊州魴鱧之珍悉登周俎蓋自古記之矣不佞南海産也水族之繁多所厭屬載游晉安則閩中異味亦既别其品彚而膾炙之顧彼此異同形質難於睹記未有列其名于毫素而肖其貎于丹青者四明屠田叔來叅鹺政司𣙜之暇博采周詢於凡鱗介之登俎者彚為一䟽而授剞劂屬不佞序之不佞愧非茂先博物焉辨龍鮓鵬毛獨喜兹䟽草損益質文雋永有味一披閱而陸海之珍藏龍宫之怪異悉具掌中奚必從淵客問波臣而後識大海之所化生蠕動者乎雖然田叔博雅名家著述甚冨他不具論若夏小正太常典録皆闗國家大要而定古今得失不佞因叙此編而併及之庶好事者知田叔不獨海錯一䟽而巳也萬厯丙申仲春朔南海周裔先書於三山之正誼堂夫水族之多莫若魚而名之異亦莫若魚物之大莫若魚而味之美亦莫若魚多而不可筭數窮推大則難以尋常量度是惟海客談之波臣辨之習者甘之否則疑而駭駭而棄矣禹奠山川魚鼈咸若周登俎豆魴鱧是珍海鏡江珧虎頭龜脚憑蝦寄蠏變蛤化鳬竒形異質總總林林閩故神仙奥區天府之國也並海而東與浙通波遵海而南與廣接壤其間彼有此無十而二三耳記目覩十而四五不有劄記曷状厥形故異物異名之志埤雅翼雅之書咸載不律于輶軒逞赫蹏于房奥者也本畯生長明州蓋波臣之國而海客與居海物惟錯類能談之㩁鹺餘暇䟽為海錯三巻猶以雜物撰徳聞見荒唐有能搜陸海之珍藏釋龍宫之膾炙増損醜徒釐正形似者予小子憑藉寵靈庶斯傳逺矣萬厯丙申春王正月屠本畯撰
