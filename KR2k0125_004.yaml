front:
  text: 閩中海錯疏附録
  hash: sha256:cd981bb09fd9a50a4ab02fec67fff896e2ed9e8c76e763b24f958fe55ad9111c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0125_WYG_004-1a, image: WYG0590/WYG0590-0524a.png}
body:
  text: 按非地所産而有者咸附録之徵異品也後有見聞冀當聯絡屠本畯記出廣南亦名緑菜按海粉閩志云有物類墨魚者吐涎而成豫往時聞閩人説即海參吐出絲也色有青黃不同者以海參食海中青藻故吐絲青食黃藻故吐絲黃閩中鄉先生陳大參文堂公云向時在廣南親見此物如竹蟶而殼薄以足裹鞋揣之則吐絲絲盡而此物空洞只存殼矣二説不同要之目睹者為真其味甚清可降痰火出廣南按燕窩相傳冬月燕子銜小魚入海島洞中壘窩明嵗春初燕棄窩去人往取之一説燕於冬月先銜鳥毛綢繆洞中次銜魚築室泥封户牖伏氣于中氣結而成明春飛去人以是得之圓如椰子須刀去毛劈片水洗淨可用閩部疏云燕窩菜竟不辨是何物漳海邊已有之蓋海燕所築銜之飛渡海中翮力倦則擲置海面浮之若杯身坐其中久之復銜以飛多為海風吹泊山澳海人得之以貨大奇大奇海語載海燕大如鳩春回巢於古巖危壁茸壘乃白海菜也島夷伺其秋去以修竿執取而鬻之謂之海燕窩隨舶至廣貴家宴品珍之其價翔矣畯據三説不同海語所載為近通待彼都近海人質之而後信也
  hash: sha256:72cc39a6a1cc98a3d7f4addf9fe8be6dcc6153ee8bae19408df519a34f2f22e2
